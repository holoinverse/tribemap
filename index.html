function getCategoryAvatars(label){

src="${member.photo ? member.photo : member.avatar}"

}

function getVillagePosition(member, index) {

  const anglePositions = [
    -110,
    -55,
    0,
    55,
    110,
    180
  ];

let distance = 24;

if (member.proximity === "Very Close") {
  distance = 16;
}

if (member.proximity === "Close") {
  distance = 23;
}

if (member.proximity === "Distant") {
  distance = 30;
}
  const totalMembers = getVisibleVillageMembers().length;
const angleStep = 360 / totalMembers;
const angleDegrees = -90 + index * angleStep;
const angle = angleDegrees * (Math.PI / 180);

  const x = 50 + Math.cos(angle) * distance;
  const y = 50 + Math.sin(angle) * distance;

  return {
    left: `${x}%`,
    top: `${y}%`
  };
}
    
function renderVisibleVillageMembers() {

 const safePositions = [

}
function getCurrentPeriodLabel() {

  if (selectedPeriod.type === "month") {

    const date =
      new Date(selectedPeriod.year, selectedPeriod.month, 1);

    return date.toLocaleDateString("en-US", {
      month: "long",
      year: "numeric"
    });

  }

  if (selectedPeriod.type === "year") {
    return `${selectedPeriod.year}`;
  }

  return "Custom Period";
}

function previousPeriod() {

  if (selectedPeriod.type === "month") {

    selectedPeriod.month--;

    if (selectedPeriod.month < 0) {
      selectedPeriod.month = 11;
      selectedPeriod.year--;
    }

    showMap();
  }
}

function nextPeriod() {

  if (selectedPeriod.type === "month") {

    selectedPeriod.month++;

    if (selectedPeriod.month > 11) {
      selectedPeriod.month = 0;
      selectedPeriod.year++;
    }

    showMap();
  }
}
    
function formatInteractionDate(dateString) {
  if (!dateString) return "No date";

  const date = new Date(dateString);

  return date.toLocaleDateString("en-AU", {
    day: "2-digit",
    month: "short",
    year: "numeric"
  });
}

function getLastInteraction(member) {
  if (!member.interactions || member.interactions.length === 0) {
    return "No interactions yet";
  }

  const sorted = [...member.interactions].sort(
    (a, b) => new Date(b.date) - new Date(a.date)
  );

  return formatInteractionDate(sorted[0].date);
}

function getRelationshipTrend(member) {
  if (!member.interactions || member.interactions.length < 2) {
    return "→ Stable";
  }

  const sorted = [...member.interactions].sort(
    (a, b) => new Date(b.date) - new Date(a.date)
  );

  const recent = sorted.slice(0, 5);

  let score = 0;

  recent.forEach(interaction => {
    if (interaction.outcome === "better") score += 1;
    if (interaction.outcome === "worse") score -= 1;
  });

  if (score >= 2) return "↑ Improving";
  if (score <= -2) return "↓ Drifting";

  return "→ Stable";
}

function getSupportScore(member) {

  if (!member.interactions || member.interactions.length === 0) {
    return 50;
  }

  let score = 0;

  member.interactions.forEach(interaction => {

    if (interaction.outcome === "better") score += 2;
    if (interaction.outcome === "same") score += 1;
    if (interaction.outcome === "worse") score += 0;

  });

  const maxPossible = member.interactions.length * 2;

  return Math.round((score / maxPossible) * 100);
}

function getRelationshipHealth(member) {

  const score = getSupportScore(member);
  const trend = getRelationshipTrend(member);
  const energy = calculateRelationshipEnergy(member);

  if (
    score >= 85 &&
    trend !== "↓ Drifting" &&
    energy !== "Draining" &&
    energy !== "Very Draining"
  ) {
    return "🌟 Excellent";
  }

  if (
    score >= 70 &&
    trend !== "↓ Drifting"
  ) {
    return "🟢 Healthy";
  }

  if (score >= 50) {
    return "🟡 Uncertain";
  }

  if (score >= 30) {
    return "🟠 Strained";
  }

  return "🔴 Critical";
}

function getActivityScore(member) {

  let score = 0;

  const interactions =
    member.interactions ? member.interactions.length : 0;

  score += interactions * 10;

  if (member.proximity === "Very Close") score += 30;
  if (member.proximity === "Close") score += 15;
  if (member.proximity === "Distant") score += 0;

  if (member.interactions && member.interactions.length > 0) {

    const validInteractions =
      member.interactions.filter(i => i.date);

    if (validInteractions.length > 0) {

      const sorted = [...validInteractions].sort(
        (a, b) => new Date(b.date) - new Date(a.date)
      );

      const lastDate = new Date(sorted[0].date);
      const today = new Date();

      const daysSince =
        Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));

      if (daysSince <= 7) score += 30;
      else if (daysSince <= 30) score += 20;
      else if (daysSince <= 90) score += 10;
    }
  }

  return score;
}

function getCurrentMonthInteractions(member) {

  if (!member.interactions) {
    return [];
  }

  const today = new Date();
  const currentMonth = today.getMonth();
  const currentYear = today.getFullYear();

  return member.interactions.filter(interaction => {
    if (!interaction.date) return false;

    const interactionDate = new Date(interaction.date);

    return (
      interactionDate.getMonth() === currentMonth &&
      interactionDate.getFullYear() === currentYear
    );
  });
}

function getVillageScore(member) {

  const monthlyInteractions =
    getCurrentMonthInteractions(member).length;

  let proximityScore = 0;

  switch (member.proximity) {

    case "Very Close":
      proximityScore = 30;
      break;

    case "Close":
      proximityScore = 20;
      break;

    case "Distant":
      proximityScore = 10;
      break;

    default:
      proximityScore = 15;

  }

  const trendScore =
    getRelationshipTrend(member) === "Improving"
      ? 10
      : 0;

  return (
    monthlyInteractions * 10 +
    proximityScore +
    trendScore
  );

}
    
function getVisibleVillageMembers() {

  const visibleLimit = 6;

  const rankedMembers = [...members]
    .map(member => {
      const monthlyCount =
        getCurrentMonthInteractions(member).length;

      return {
        member: member,
        monthlyCount: monthlyCount,
        villageScore: getVillageScore(member)
      };
    })
    .filter(item => item.monthlyCount > 0)
    .sort((a, b) => {
      if (b.monthlyCount !== a.monthlyCount) {
        return b.monthlyCount - a.monthlyCount;
      }

      return b.villageScore - a.villageScore;
    });

  if (rankedMembers.length <= visibleLimit) {
    return rankedMembers.map(item => item.member);
  }

  const cutoffCount =
    rankedMembers[visibleLimit - 1].monthlyCount;

  return rankedMembers
    .filter(item => item.monthlyCount >= cutoffCount)
    .map(item => item.member);
}
    
function getCategoryDashboard(categoryName) {

  const categoryMembers =
    members.filter(member => member.category === categoryName);

  let supportive = 0;
  let neutral = 0;
  let draining = 0;

  let totalScore = 0;

  categoryMembers.forEach(member => {

    const energy = calculateRelationshipEnergy(member);

    if (
      energy === "Supportive" ||
      energy === "Very Supportive"
    ) {
      supportive++;
    }
    else if (
      energy === "Draining" ||
      energy === "Very Draining"
    ) {
      draining++;
    }
    else {
      neutral++;
    }

    totalScore += getSupportScore(member);

  });

  const averageScore =
    categoryMembers.length > 0
      ? Math.round(totalScore / categoryMembers.length)
      : 0;

  return `

      max-width:500px;

}

  font-size:20px;
  margin-top:10px;
  margin-bottom:12px;
  color:#6f6255;
">
  How did you feel after interacting with this person today?
</p>
      <select
        id="interactionOutcome"
        style="
          width:100%;
          max-width:400px;
          padding:15px;
          border-radius:12px;
          border:1px solid #ccc;
          font-size:18px;
          margin-bottom:20px;
        "
      >
<option value="better">😊 Better</option>
<option value="same">😐 Same</option>
<option value="worse">😔 Worse</option>
      </select>

      <br>

      <textarea
        id="interactionNotes"
        placeholder="Notes (optional)"
        style="
          width:100%;
          max-width:400px;
          height:120px;
          padding:15px;
          border-radius:12px;
          border:1px solid #ccc;
          font-size:18px;

      ></textarea>

      <button onclick="saveInteraction('${memberName}', '${categoryName}')">

}

function saveInteraction(memberName, categoryName) {

  const member =
    members.find(m =>
      m.name === memberName &&
      m.category === categoryName
    );

  if (!member) {
    return;
  }
  
  const interaction = {
    date: document.getElementById("interactionDate").value,
    outcome: document.getElementById("interactionOutcome").value,
    notes: document.getElementById("interactionNotes").value.trim()
  };

  if (!member.interactions) {
    member.interactions = [];
  }

  member.interactions.push(interaction);

  saveData();

  openCategory(categoryName);
}

function showInteractionHistory(memberName, categoryName){

  const member =
    members.find(m =>
      m.name === memberName &&
      m.category === categoryName
    );

  if(!member){
    return;
  }

  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      background:#f3eadb;
      font-family:Georgia, serif;
      color:#2e2721;
      text-align:center;
      padding:40px;
      box-sizing:border-box;
    ">

      <button onclick="openCategory('${categoryName}')">
        ← Back
      </button>

      <h1 style="
  font-size:72px;
  margin:20px 0;
">
  History
</h1>

      <h3>
        ${member.name}
      </h3>

      ${
        member.interactions && member.interactions.length > 0
        ?
        member.interactions.map((interaction,index)=>`

          <div style="
            max-width:500px;
            margin:20px auto;
            padding:20px;
            background:white;
            border-radius:18px;
            border:1px solid #d8c8af;
          ">

           <strong>${formatInteractionDate(interaction.date)}</strong>
            <br>

            <br><br>

            ${
              interaction.outcome === "better"
                ? "😊 Better"
                : interaction.outcome === "same"
                ? "😐 Same"
                : "😔 Worse"
            }

            <br><br>

            ${interaction.notes || ""}

            <br><br>

<button onclick="
  showEditInteraction(
    '${member.name}',
    '${member.category}',
    ${index}
  )
" style="
  margin-right:10px;
">
  Edit
</button>
            <button onclick="
              deleteInteraction(
                '${member.name}',
                '${member.category}',
                ${index}
              )
            ">
              Delete
            </button>

          </div>

        `).join("")
        :
        "<p>No interactions yet.</p>"
      }

  `;
}

function showEditInteraction(memberName, categoryName, interactionIndex) {
  const member = members.find(m =>
    m.name === memberName &&
    m.category === categoryName
  );

  if (!member || !member.interactions || !member.interactions[interactionIndex]) {
    return;
  }

  const interaction = member.interactions[interactionIndex];

  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      background:#f3eadb;
      font-family:Georgia, serif;
      color:#2e2721;
      text-align:center;
      padding:40px;
      box-sizing:border-box;
    ">

      <button onclick="showInteractionHistory('${memberName}', '${categoryName}')">
        ← Back
      </button>

      <h1 style="font-size:42px; margin-bottom:10px;">
        Edit Interaction
      </h1>

      <p style="font-size:20px; color:#6f6255;">
        ${memberName}
      </p>

      <input
        id="editInteractionDate"
        type="date"
        value="${interaction.date}"
        style="width:100%; max-width:400px; padding:15px; border-radius:12px; border:1px solid #ccc; font-size:18px; margin-bottom:20px;"
      >

      <br>

      <select
        id="editInteractionOutcome"
        style="width:100%; max-width:400px; padding:15px; border-radius:12px; border:1px solid #ccc; font-size:18px; margin-bottom:20px;"
      >
        <option value="better">😊 Better</option>
        <option value="same">😐 Same</option>
        <option value="worse">😔 Worse</option>
      </select>

      <br>

      <textarea
        id="editInteractionNotes"
        placeholder="Notes (optional)"
        style="width:100%; max-width:400px; height:120px; padding:15px; border-radius:12px; border:1px solid #ccc; font-size:18px; font-family:Georgia, serif; margin-bottom:20px;"
      >${interaction.notes || ""}</textarea>

      <br>

      <button onclick="saveEditedInteraction('${memberName}', '${categoryName}', ${interactionIndex})">
        Save Changes
      </button>

    </div>
  `;

  document.getElementById("editInteractionOutcome").value = interaction.outcome;
}

function saveEditedInteraction(memberName, categoryName, interactionIndex) {
  const member = members.find(m =>
    m.name === memberName &&
    m.category === categoryName
  );

  if (!member || !member.interactions || !member.interactions[interactionIndex]) {
    return;
  }

  member.interactions[interactionIndex] = {
    date: document.getElementById("editInteractionDate").value,
    outcome: document.getElementById("editInteractionOutcome").value,
    notes: document.getElementById("editInteractionNotes").value.trim()
  };

  saveData();

  showInteractionHistory(memberName, categoryName);
}

    function calculateRelationshipEnergy(member) {

  if (!member.interactions || member.interactions.length === 0) {
    return "Neutral";
  }

  let score = 0;

  member.interactions.forEach(interaction => {
    if (interaction.outcome === "better") score += 1;
    if (interaction.outcome === "worse") score -= 1;
  });

  if (score >= 4) return "Very Supportive";
  if (score >= 1) return "Supportive";
  if (score === 0) return "Neutral";
  if (score <= -4) return "Very Draining";

  return "Draining";
}
    
function saveData() {
  localStorage.setItem("tribemap_name", currentTribeName);
  localStorage.setItem("tribemap_members", JSON.stringify(members));
  localStorage.setItem("tribemap_owner", JSON.stringify(tribeOwner));
}

const savedName =
  localStorage.getItem("tribemap_name");

const savedMembers =
  localStorage.getItem("tribemap_members");

    const savedOwner =
  localStorage.getItem("tribemap_owner");

if (savedName) {
  currentTribeName = savedName;
}

if (savedMembers) {
  members = JSON.parse(savedMembers);
}

if (savedOwner) {
  tribeOwner = JSON.parse(savedOwner);
}
    
</script>
