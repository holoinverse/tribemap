<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TribeMap</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f3eadb;
      color: #2e2721;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .card {
      max-width: 720px;
      padding: 48px 28px;
    }

    h1 {
      font-size: clamp(42px, 8vw, 82px);
      letter-spacing: 0.14em;
      margin: 0 0 24px;
      font-weight: 700;
    }

    p {
      font-size: clamp(18px, 2.4vw, 26px);
      line-height: 1.4;
      color: #6f6255;
      margin: 0 0 36px;
    }

    button {
      border: none;
      border-radius: 999px;
      background: #2e2721;
      color: #fffaf1;
      padding: 15px 28px;
      font-family: inherit;
      font-size: 17px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>YOUR TRIBE</h1>
    <p>The people around you shape your life more than you realize.</p>
    <button onclick="showNameScreen()">   Begin Mapping </button>
  </div>
  <script>
function showNameScreen() {
  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#f3eadb;
      font-family:Georgia, serif;
    ">
      <div style="
        max-width:700px;
        text-align:center;
        padding:40px;
      ">
        <h1 style="
          font-size:48px;
          margin-bottom:20px;
        ">
          What is the name of your tribe?
        </h1>

        <input
  id="tribeName"
  type="text"
  placeholder="My Tribe"
  style="
    width:100%;
    max-width:400px;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
  "
>

<br><br>

<button onclick="saveTribeName()">
  Continue
</button>

      </div>
    </div>
  `;
}
   function saveTribeName() {
  const tribeName =
    document.getElementById("tribeName").value.trim() || "My Tribe";

  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      background:#f3eadb;
      font-family:Georgia, serif;
      color:#2e2721;
      text-align:center;
      padding:40px;
      box-sizing:border-box;
    ">
      <h1 style="font-size:42px; margin-bottom:10px;">
        ${tribeName}
      </h1>

      <p style="font-size:20px; color:#6f6255; margin-bottom:40px;">
        Your tribe map is beginning.
      </p>

      <div style="
        position:relative;
        width:min(90vw,700px);
        height:min(90vw,700px);
        margin:0 auto;
        border-radius:50%;
      ">

        <div style="
          position:absolute;
          left:50%;
          top:50%;
          transform:translate(-50%,-50%);
          width:130px;
          height:130px;
          border-radius:50%;
          background:#2e2721;
          color:#fffaf1;
          display:flex;
          align-items:center;
          justify-content:center;
          font-size:22px;
        ">
          YOU
        </div>

${categoryNode("👨‍👩‍👧", "Family", "50%", "5%")}
${categoryNode("👥", "Friends", "78%", "15%")}
${categoryNode("❤️", "Relationship", "90%", "50%")}
${categoryNode("💼", "Work", "78%", "85%")}
${categoryNode("🎨", "Projects", "50%", "95%")}
${categoryNode("🎓", "Studies", "22%", "85%")}
${categoryNode("🐕", "Pets", "10%", "50%")}
${categoryNode("🌱", "Community", "22%", "15%")}

      </div>
    </div>
  `;
}

function categoryNode(icon, label, left, top) {
  return `
    <button onclick="openCategory('${label}')" style="
      position:absolute;
      left:${left};
      top:${top};
      transform:translate(-50%,-50%);
      width:120px;
      height:120px;
      border-radius:50%;
      background:#fffaf1;
      border:1px solid #d8c8af;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      box-shadow:0 12px 30px rgba(46,39,33,0.12);
      cursor:pointer;
      color:#2e2721;
      font-family:Georgia, serif;
    ">
      <div style="font-size:30px;">${icon}</div>
      <div style="font-size:16px;">${label}</div>
    </button>
  `;
}
    
function openCategory(categoryName) {
  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      background:#f3eadb;
      font-family:Georgia, serif;
      color:#2e2721;
      text-align:center;
      padding:40px;
      box-sizing:border-box;
    ">
      <button onclick="saveTribeName()" style="
        margin-bottom:40px;
        background:#2e2721;
        color:#fffaf1;
        border:none;
        border-radius:999px;
        padding:12px 22px;
        font-family:Georgia, serif;
        cursor:pointer;
      ">
        ← Back to Map
      </button>

      <h1 style="font-size:54px; margin-bottom:10px;">
        ${categoryName}
      </h1>

      <p style="font-size:20px; color:#6f6255;">
        No members yet.
      </p>

      <button onclick="showAddMember('${categoryName}')" style="
  margin-top:30px;
  background:#2e2721;
  color:#fffaf1;
  border:none;
  border-radius:999px;
  padding:15px 28px;
  font-family:Georgia, serif;
  font-size:17px;
  cursor:pointer;
">
  + Add Member
</button>

    </div>
  `;
}
    
function showAddMember(categoryName) {
  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      background:#f3eadb;
      font-family:Georgia, serif;
      color:#2e2721;
      text-align:center;
      padding:40px;
      box-sizing:border-box;
    ">
      <h1>Add Member</h1>

      <p>${categoryName}</p>

      <input
        id="memberName"
        placeholder="Name"
        style="
          width:100%;
          max-width:400px;
          padding:15px;
          border-radius:12px;
          border:1px solid #ccc;
          font-size:18px;
          margin-bottom:20px;
        "
      >

      <br>

      <input
        id="memberRelationship"
        placeholder="Relationship"
        style="
          width:100%;
          max-width:400px;
          padding:15px;
          border-radius:12px;
          border:1px solid #ccc;
          font-size:18px;
        "
      >

      <br><br>

      <button onclick="saveMember('${categoryName}')">
        Save
      </button>
    </div>
  `;
}

function saveMember(categoryName) {
  const memberName =
    document.getElementById("memberName").value.trim();

  const relationship =
    document.getElementById("memberRelationship").value.trim();

  alert(
    "Member Saved:\\n\\n" +
    memberName +
    "\\n" +
    relationship +
    "\\n\\nCategory: " +
    categoryName
  );
}
    
</script>
  
</body>
</html>
