<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TribeMap</title>

<style>

.avatar-grid{
  display:grid;
  grid-template-columns:repeat(4, 90px);
  gap:14px;
  justify-content:center;
}

.avatar-btn{
  width:90px;
  height:90px;
  border:1px solid rgba(46,39,33,.08);
  border-radius:50%;
  background:#d8cdbc;
  box-shadow:0 4px 12px rgba(46,39,33,.08);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s ease;
}

.avatar-btn img{
  width:72px;
  height:72px;
}
  
.avatar-btn.selected{
  border:4px solid #c9a96e;
  box-shadow:0 0 20px rgba(201,169,110,.65);
  transform:scale(1.12);
}
  
    body {
      margin: 0;
      min-height: 100vh;
      background: #f3eadb;
      color: #2e2721;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .card {
      max-width: 720px;
      padding: 48px 28px;
    }

    h1 {
      font-size: clamp(42px, 8vw, 82px);
      letter-spacing: 0.14em;
      margin: 0 0 24px;
      font-weight: 700;
    }

    p {
      font-size: clamp(18px, 2.4vw, 26px);
      line-height: 1.4;
      color: #6f6255;
      margin: 0 0 36px;
    }

    button {
      border: none;
      border-radius: 999px;
      background: #2e2721;
      color: #fffaf1;
      padding: 15px 28px;
      font-family: inherit;
      font-size: 17px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>YOUR TRIBE</h1>
    <p>The people around you shape your life more than you realize.</p>
    <button onclick="showNameScreen()">   Begin Mapping </button>
  </div>
  <script>
    
let currentTribeName = "";
let members = [];
    
function showNameScreen() {
  
  document.body.innerHTML = `
  
    <div style="
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#f3eadb;
      font-family:Georgia, serif;
    ">
      <div style="
        max-width:700px;
        text-align:center;
        padding:40px;
      ">
        <h1 style="
          font-size:48px;
          margin-bottom:20px;
        ">
          What is the name of your tribe?
        </h1>

        <input
  id="tribeName"
  type="text"
  placeholder="My Tribe"
  style="
    width:100%;
    max-width:400px;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
  "
>

<br><br>

<button onclick="saveTribeName()">
  Continue
</button>

      </div>
    </div>
  `;
}
  function saveTribeName() {
  const tribeName =
    document.getElementById("tribeName").value.trim() || "My Tribe";

  currentTribeName = tribeName;

saveData();

showMap();
    
}

function showMap() {
  const tribeName = currentTribeName || "My Tribe";

  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      background:#f3eadb;
      font-family:Georgia, serif;
      color:#2e2721;
      text-align:center;
      padding:40px;
      box-sizing:border-box;
    ">
      <h1 style="font-size:42px; margin-bottom:10px;">
        ${tribeName}
      </h1>

      <p style="font-size:20px; color:#6f6255; margin-bottom:40px;">
        Your tribe map is beginning.
      </p>

      <div style="
        position:relative;
        width:min(90vw,700px);
        height:min(90vw,700px);
        margin:0 auto;
        border-radius:50%;
      ">

        <div style="
          position:absolute;
          left:50%;
          top:50%;
          transform:translate(-50%,-50%);
          width:130px;
          height:130px;
          border-radius:50%;
          background:#2e2721;
          color:#fffaf1;
          display:flex;
          align-items:center;
          justify-content:center;
          font-size:22px;
        ">
          YOU
        </div>

${categoryNode("👨‍👩‍👧", "Family", "50%", "5%")}
${categoryNode("👥", "Friends", "78%", "15%")}
${categoryNode("❤️", "Love & Relationships", "90%", "50%")}
${categoryNode("💼", "Work", "78%", "85%")}
${categoryNode("🎨", "Projects", "50%", "95%")}
${categoryNode("🎓", "Studies", "22%", "85%")}
${categoryNode("🐕", "Pets", "10%", "50%")}
${categoryNode("🌱", "Community", "22%", "15%")}

      </div>
    </div>
  `;
}

function getCategoryAvatars(label){

  const categoryMembers =
    members.filter(member => member.category === label);

  return categoryMembers
    .slice(0,3)
    .map(member => `
      <img
src="${member.photo ? member.photo : member.avatar}"
        style="
          width:24px;
          height:24px;
          border-radius:50%;
          background:#d8cdbc;
          padding:2px;
        "
      >
    `)
    .join("");
}
    
function categoryNode(icon, label, left, top) {
const count =
  members.filter(member => member.category === label).length;

const avatars =
  getCategoryAvatars(label);
  
  return `
    <button onclick="openCategory('${label}')" style="
      position:absolute;
      left:${left};
      top:${top};
      transform:translate(-50%,-50%);
      width:120px;
      height:120px;
      border-radius:50%;
      background:#fffaf1;
      border:1px solid #d8c8af;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      box-shadow:0 12px 30px rgba(46,39,33,0.12);
      cursor:pointer;
      color:#2e2721;
      font-family:Georgia, serif;
    ">
      <div style="font-size:30px;">${icon}</div>
      
     <div style="font-size:16px;">
  ${label} (${count})
</div>

<div style="
  display:flex;
  gap:4px;
  margin-top:6px;
  justify-content:center;
">
  ${avatars}
</div>

    </button>
  `;
}
    
function openCategory(categoryName) {
  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      background:#f3eadb;
      font-family:Georgia, serif;
      color:#2e2721;
      text-align:center;
      padding:40px;
      box-sizing:border-box;
    ">
      <button onclick="showMap()" style="
        margin-bottom:40px;
        background:#2e2721;
        color:#fffaf1;
        border:none;
        border-radius:999px;
        padding:12px 22px;
        font-family:Georgia, serif;
        cursor:pointer;
      ">
        ← Back to Map
      </button>

      <h1 style="font-size:54px; margin-bottom:10px;">
        ${categoryName}
      </h1>

     ${renderMembers(categoryName)}

  <button onclick="showAddMember('${categoryName}')" style="
  margin-top:30px;
  background:#2e2721;
  color:#fffaf1;
  border:none;
  border-radius:999px;
  padding:15px 28px;
  font-family:Georgia, serif;
  font-size:17px;
  cursor:pointer;
">
  + Add Member
</button>

    </div>
  `;
}
    
function showAddMember(categoryName) {
  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      background:#f3eadb;
      font-family:Georgia, serif;
      color:#2e2721;
      text-align:center;
      padding:40px;
      box-sizing:border-box;
    ">
  <h1 style="
  font-size:72px;
  margin-bottom:20px;
  line-height:1;
">
  Add Member
</h1>

      <p>${categoryName}</p>

      <input
        id="memberName"
        placeholder="Name"
        style="
          width:100%;
          max-width:400px;
          padding:15px;
          border-radius:12px;
          border:1px solid #ccc;
          font-size:18px;
          margin-bottom:20px;
        "
      >

      <br>

  <select
  id="memberRelationship"
  style="
    width:100%;
    max-width:400px;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
  "
>
  ${getRelationshipOptions(categoryName)}
</select>

  <br><br>

<p style="font-size:18px; color:#6f6255; margin-bottom:12px;">
  Relationship Energy
</p>

<select
  id="memberEnergy"
  style="
    width:100%;
    max-width:400px;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
  "
>
  <option value="Very Supportive">Very Supportive</option>
  <option value="Supportive">Supportive</option>
  <option value="Neutral" selected>Neutral</option>
  <option value="Draining">Draining</option>
  <option value="Very Draining">Very Draining</option>
</select>

<br><br>

<p style="font-size:18px; color:#6f6255; margin-bottom:12px;">
  Choose an avatar
</p>

<input id="memberAvatar" type="hidden" value="avatar-woman-short.png">

<div class="avatar-grid">

<button class="avatar-btn selected" onclick="selectAvatar('avatar-woman-short.png', this)">
<img src="avatar-woman-short.png">
</button>

<button class="avatar-btn" onclick="selectAvatar('avatar-woman-long.png', this)">
<img src="avatar-woman-long.png">
</button>

<button class="avatar-btn" onclick="selectAvatar('avatar-girl.png', this)">
<img src="avatar-girl.png">
</button>

<button class="avatar-btn" onclick="selectAvatar('avatar-boy.png', this)">
<img src="avatar-boy.png">
</button>

<button class="avatar-btn" onclick="selectAvatar('avatar-baby.png', this)">
<img src="avatar-baby.png">
</button>

<button class="avatar-btn" onclick="selectAvatar('avatar-adult-man.png', this)">
<img src="avatar-adult-man.png">
</button>

<button class="avatar-btn" onclick="selectAvatar('avatar-elder-man.png', this)">
<img src="avatar-elder-man.png">
</button>

<button class="avatar-btn" onclick="selectAvatar('avatar-elder-woman.png', this)">
<img src="avatar-elder-woman.png">
</button>

<button class="avatar-btn" onclick="selectAvatar('avatar-generic.png', this)">
<img src="avatar-generic.png">
</button>

<button class="avatar-btn" onclick="selectAvatar('avatar-curly.png', this)">
<img src="avatar-curly.png">
</button>

<button class="avatar-btn" onclick="selectAvatar('avatar-paw.png', this)">
<img src="avatar-paw.png">
</button>

</div>

<p style="font-size:16px; color:#6f6255; margin-top:18px; margin-bottom:10px;">
  Or upload a photo
</p>

<input
  id="memberPhoto"
  type="file"
  accept="image/*"
  style="
    margin-bottom:20px;
    font-family:Georgia, serif;
  "
>

<br>

<button onclick="saveMember('${categoryName}')">
  Save
</button>
    </div>
  `;
}

function selectAvatar(fileName, button){

  document.getElementById('memberAvatar').value = fileName;

  document.querySelectorAll('.avatar-btn')
    .forEach(btn => btn.classList.remove('selected'));

  button.classList.add('selected');
}
    
function saveMember(categoryName) {

  const memberName =
    document.getElementById("memberName").value.trim();

  const relationship =
    document.getElementById("memberRelationship").value.trim();

const energy =
  document.getElementById("memberEnergy").value;
  
  const avatar =
    document.getElementById("memberAvatar").value;

  const photoInput =
    document.getElementById("memberPhoto");

  if (!memberName || !relationship) {
    alert("Please add name and relationship.");
    return;
  }

  if (photoInput.files.length > 0) {

    const reader = new FileReader();

    reader.onload = function(e) {

      members.push({
        name: memberName,
        relationship: relationship,
        category: categoryName,
        energy: energy,
        avatar: avatar,
        photo: e.target.result
      });

      saveData();
      openCategory(categoryName);

    };

    reader.readAsDataURL(photoInput.files[0]);

  } else {

    members.push({
      name: memberName,
      relationship: relationship,
      category: categoryName,
      energy: energy,
      avatar: avatar,
      photo: null
    });

    saveData();
    openCategory(categoryName);

  }
}
    
function renderMembers(categoryName) {
  const categoryMembers =
    members.filter(member => member.category === categoryName);

if (categoryMembers.length === 0) {
  return `
    <p style="font-size:20px; color:#6f6255;">
      No members yet.
    </p>
  `;
}

  return `
  <div style="
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
    margin-top:30px;
  ">
    ${categoryMembers.map(member => `
      <div style="
        width:160px;
        padding:22px;
        border-radius:28px;
        background:#fffaf1;
        border:1px solid #d8c8af;
        box-shadow:0 12px 30px rgba(46,39,33,0.10);
      ">
        <img
  src="${member.photo ? member.photo : member.avatar}"
  style="
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:50%;
    margin-bottom:10px;
  "
>
        <strong style="font-size:22px;">${member.name}</strong>
        <div style="font-size:16px; color:#6f6255; margin-top:6px;">
          ${member.relationship}
        </div>

<div style="
  font-size:14px;
  margin-top:8px;
">
  ${
    member.energy === "Very Supportive" ? "🟢 Very Supportive" :
    member.energy === "Supportive" ? "🟢 Supportive" :
    member.energy === "Draining" ? "🔴 Draining" :
    member.energy === "Very Draining" ? "🔴 Very Draining" :
    "⚪ Neutral"
  }
</div>

        <br><br>

<button onclick="showEditMember('${member.name}', '${member.category}')" style="
  background:#2e2721;
  color:#fffaf1;
  border:none;
  border-radius:999px;
  padding:8px 14px;
  font-family:Georgia, serif;
  font-size:14px;
  cursor:pointer;
  margin-right:6px;
">
  Edit
</button>

        <button onclick="deleteMember('${member.name}', '${member.category}')" style="
          background:#d8c8af;
          color:#2e2721;
          border:none;
          border-radius:999px;
          padding:8px 14px;
          font-family:Georgia, serif;
          font-size:14px;
          cursor:pointer;
        ">
          Delete
        </button>
      </div>
    `).join("")}
  </div>
`;

  }
  
function getRelationshipOptions(categoryName) {

if (categoryName === "Family") {
  return `
    <option value="Grandmother">Grandmother</option>
    <option value="Grandfather">Grandfather</option>

    <option value="Mother">Mother</option>
    <option value="Father">Father</option>

    <option value="Daughter">Daughter</option>
    <option value="Son">Son</option>

    <option value="Sister">Sister</option>
    <option value="Brother">Brother</option>

    <option value="Half Sister">Half Sister</option>
    <option value="Half Brother">Half Brother</option>

    <option value="Stepmother">Stepmother</option>
    <option value="Stepfather">Stepfather</option>

    <option value="Stepsister">Stepsister</option>
    <option value="Stepbrother">Stepbrother</option>

    <option value="Stepdaughter">Stepdaughter</option>
    <option value="Stepson">Stepson</option>

    <option value="Aunt">Aunt</option>
    <option value="Uncle">Uncle</option>

    <option value="Cousin">Cousin</option>

    <option value="Niece">Niece</option>
    <option value="Nephew">Nephew</option>

    <option value="Granddaughter">Granddaughter</option>
    <option value="Grandson">Grandson</option>

    <option value="Mother-in-law">Mother-in-law</option>
    <option value="Father-in-law">Father-in-law</option>

    <option value="Sister-in-law">Sister-in-law</option>
    <option value="Brother-in-law">Brother-in-law</option>

    <option value="Family Member">Family Member</option>
  `;
}
    
  if (categoryName === "Friends") {
  return `
    <option value="Best Friend">Best Friend</option>
    <option value="Close Friend">Close Friend</option>
    <option value="Friend">Friend</option>
    <option value="Childhood Friend">Childhood Friend</option>

    <option value="School Friend">School Friend</option>
    <option value="College Friend">College Friend</option>

    <option value="Online Friend">Online Friend</option>

    <option value="Travel Friend">Travel Friend</option>

    <option value="Neighbor">Neighbor</option>

    <option value="Acquaintance">Acquaintance</option>
  `;
}

  if (categoryName === "Love & Relationships") {
  return `
    <option value="Wife">Wife</option>
    <option value="Husband">Husband</option>

    <option value="Girlfriend">Girlfriend</option>
    <option value="Boyfriend">Boyfriend</option>

    <option value="Fiancée">Fiancée</option>
    <option value="Fiancé">Fiancé</option>

    <option value="Partner">Partner</option>

    <option value="Ex Wife">Ex Wife</option>
    <option value="Ex Husband">Ex Husband</option>

    <option value="Ex Girlfriend">Ex Girlfriend</option>
    <option value="Ex Boyfriend">Ex Boyfriend</option>

    <option value="Ex Partner">Ex Partner</option>

    <option value="Crush">Crush</option>

    <option value="Relationship Interest">
      Relationship Interest
    </option>
  `;
}

 if (categoryName === "Work") {
  return `
    <option value="Boss">Boss</option>
    <option value="Manager">Manager</option>

    <option value="Colleague">Colleague</option>
    <option value="Coworker">Coworker</option>

    <option value="Employee">Employee</option>

    <option value="Client">Client</option>

    <option value="Business Partner">Business Partner</option>

    <option value="Mentor">Mentor</option>

    <option value="Consultant">Consultant</option>

    <option value="Team Member">Team Member</option>

    <option value="Supervisor">Supervisor</option>

    <option value="Work Connection">Work Connection</option>
  `;
}

  if (categoryName === "Pets") {
    return `
      <option value="Dog">Dog</option>
      <option value="Cat">Cat</option>
      <option value="Rabbit">Rabbit</option>
      <option value="Bird">Bird</option>
    `;
  }

  return `
    <option value="Connection">Connection</option>
    <option value="Mentor">Mentor</option>
    <option value="Teacher">Teacher</option>
    <option value="Community Member">Community Member</option>
  `;
}

   function showEditMember(memberName, categoryName){

  const member =
    members.find(m =>
      m.name === memberName &&
      m.category === categoryName
    );

  if(!member){
    return;
  }

  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      background:#f3eadb;
      font-family:Georgia, serif;
      color:#2e2721;
      text-align:center;
      padding:40px;
      box-sizing:border-box;
    ">

      <h1 style="
        font-size:72px;
        margin-bottom:20px;
        line-height:1;
      ">
        Edit Member
      </h1>

      <p>${categoryName}</p>

      <input
        id="editMemberName"
        value="${member.name}"
        style="
          width:100%;
          max-width:400px;
          padding:15px;
          border-radius:12px;
          border:1px solid #ccc;
          font-size:18px;
          margin-bottom:20px;
        "
      >

      <br>

    <select
  id="editMemberRelationship"
  style="
    width:100%;
    max-width:400px;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
    margin-bottom:20px;
  "
>
  ${getRelationshipOptions(categoryName)}
</select>

<br>

<select
  id="editMemberCategory"
  style="
    width:100%;
    max-width:400px;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
    margin-bottom:20px;
  "
>
  <option>Family</option>
  <option>Friends</option>
  <option>Love & Relationships</option>
  <option>Work</option>
  <option>Studies</option>
  <option>Projects</option>
  <option>Community</option>
  <option>Pets</option>
</select>

      <br>

      <img
        src="${member.photo ? member.photo : member.avatar}"
        style="
          width:110px;
          height:110px;
          object-fit:cover;
          border-radius:50%;
          margin:20px 0;
        "
      >

      <br>

      <button onclick="saveEditedMember('${memberName}', '${categoryName}')">
        Save Changes
      </button>

      <br><br>

      <button onclick="openCategory('${categoryName}')">
        Cancel
      </button>

    </div>
  `;
     
document.getElementById("editMemberRelationship").value =
  member.relationship;

document.getElementById("editMemberCategory").value =
  member.category;
     
}

function saveEditedMember(oldName, categoryName){

  const member =
    members.find(m =>
      m.name === oldName &&
      m.category === categoryName
    );

  if(!member){
    return;
  }

  member.name =
    document.getElementById("editMemberName").value.trim();

  member.relationship =
    document.getElementById("editMemberRelationship").value.trim();

member.category =
  document.getElementById("editMemberCategory").value;
  
  saveData();

  openCategory(member.category);
}
    
   function deleteMember(memberName, categoryName) {
  members = members.filter(member => {
  return !(member.name === memberName &&
           member.category === categoryName);
});

saveData();

openCategory(categoryName);
     
}

function saveData() {
  localStorage.setItem("tribemap_name", currentTribeName);
  localStorage.setItem("tribemap_members", JSON.stringify(members));
}

const savedName =
  localStorage.getItem("tribemap_name");

const savedMembers =
  localStorage.getItem("tribemap_members");

if (savedName) {
  currentTribeName = savedName;
}

if (savedMembers) {
  members = JSON.parse(savedMembers);
}
    
</script>

  
</body>
</html>
