<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TribeMap</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f3eadb;
      color: #2e2721;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .card {
      max-width: 720px;
      padding: 48px 28px;
    }

    h1 {
      font-size: clamp(42px, 8vw, 82px);
      letter-spacing: 0.14em;
      margin: 0 0 24px;
      font-weight: 700;
    }

    p {
      font-size: clamp(18px, 2.4vw, 26px);
      line-height: 1.4;
      color: #6f6255;
      margin: 0 0 36px;
    }

    button {
      border: none;
      border-radius: 999px;
      background: #2e2721;
      color: #fffaf1;
      padding: 15px 28px;
      font-family: inherit;
      font-size: 17px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>YOUR TRIBE</h1>
    <p>The people around you shape your life more than you realize.</p>
    <button>Begin Mapping</button>
  </div>
</body>
</html>
